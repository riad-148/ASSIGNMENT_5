<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>
  <div class="navbar">
    <div class="logo">GitHub Issues</div>
    <input type="text" id="search" placeholder="Search Issues..." />
    <button onclick="searchIssues()">Search</button>
  </div>
   <div class="tabs">
    <button class="tab" id="all-tab" onclick="handleTabClick('all')">All</button>
    <button class="tab" id="open-tab" onclick="handleTabClick('open')">Open</button>
    <button class="tab" id="closed-tab" onclick="handleTabClick('closed')">Closed</button>
  </div>
 <div class="issues-summary">
    <div class="summary-icon">
      <img src="assets/Aperture.png" alt="">
    </div>

    <div class="summary-text">
      <span id="issue-count">0</span> issues found
      <p>Track and manage your project issues</p>
    </div>

    <div class="status-markers">
      <span class="marker open">● Open</span>
      <span class="marker closed">● Closed</span>
    </div>
  </div>
  <div id="issues" class="issues-container">
  </div>
  <div id="m" class="modal">

    <div class="modal-content">

      <div class="modal-header">

        <div class="issue-header-main">

          <div class="issue-status-large" id="statusb"></div>

          <div class="issue-title-section">
            <h1 id="title">Issue Details</h1>

            <div class="issue-meta-header">
              <span class="issue-number" id="num"></span>
              <span class="issue-author" id="author"></span>
              <span class="issue-timestamp" id="created"></span>
            </div>
          </div>

        </div>

        <div class="modal-actions">
          <span class="close-btn" onclick="closeModal()">×</span>
        </div>

      </div>

  <div class="modal-body">

       
        <div class="content">
          <div class="desc" id="desc"></div>
          <div class="labels-sec" id="labels"></div>
        </div>

       
        <div class="sum">

          <div class="item left">
            <span class="lab">Assignee</span>
            <div class="val" id="assignee"></div>
          </div>

          <div class="item cen">
            <span class="lab">Priority</span>
            <div class="val" id="priority"></div>
          </div>

        </div>

        <div class="tl">

          <div class="box">
            <h3 class="box-title">Timeline</h3>

            <div class="tl">

              <div class="tl-item">
                <div class="tl-icon">🕒</div>
                <div class="tl-content">
                  <div class="tl-title">Created</div>
                  <div class="tl-time" id="createdTime"></div>
                </div>
              </div>

              <div class="tl-item">
                <div class="tl-icon">✏️</div>
                <div class="tl-content">
                  <div class="tl-title">Last updated</div>
                  <div class="tl-time" id="updatedTime"></div>
                </div>
              </div>

            </div>

          </div>

        </div>

      </div>
    </div>
  </div>
<script src="main.js"></script>

</body>
</html>

</body>
</html>
